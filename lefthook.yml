pre-commit:
  jobs:
    - name: check-author
      run: |
        NAME=$(git config user.name)
        if [ "$NAME" != "GrantKlassy" ]; then
          echo "ERROR: git user.name is '$NAME' — expected 'GrantKlassy'"
          echo "  git config user.name 'GrantKlassy'"
          echo "  git config user.email '28637437+GrantKlassy@users.noreply.github.com'"
          exit 1
        fi

    - name: shell-syntax
      run: |
        ERRORS=0
        for f in $(find bash scripts -name '*.sh' 2>/dev/null); do
          if ! bash -n "$f" 2>&1; then
            echo "FAIL: $f"
            ERRORS=$((ERRORS + 1))
          fi
        done
        if [ "$ERRORS" -gt 0 ]; then
          echo "ERROR: $ERRORS file(s) have syntax errors"
          exit 1
        fi
        echo "OK: all .sh files pass bash -n"

    - name: shellcheck
      run: |
        if ! command -v shellcheck &>/dev/null; then
          echo "WARN: shellcheck not installed, skipping (sudo dnf install ShellCheck)"
          exit 0
        fi
        find bash scripts -name '*.sh' -exec shellcheck {} +
        echo "OK: shellcheck passed"

commit-msg:
  jobs:
    - name: no-coauthor
      run: |
        if grep -qi "co-authored-by" {1}; then
          echo "ERROR: Co-Authored-By trailer detected — not allowed in grantklassy repos"
          exit 1
        fi

pre-push:
  jobs:
    - name: repo-standards
      run: task check
